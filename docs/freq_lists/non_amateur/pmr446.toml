# PMR446 (rhb-full v2.2.1, table 20, p. 23–24).
# Open band 446.0–446.2 MHz. Max 500 mW, fixed antenna, no repeater use.
# K1–K8 traditional analog FM. K9–K16 (D1–D8) recommended for digital
# (DPMR), though either may be used analog or digital. 12.5 kHz channel
# spacing, FM deviation max 2.5 kHz (narrowband).

