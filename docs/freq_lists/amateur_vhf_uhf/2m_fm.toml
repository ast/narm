# Amateur 2 m FM channels (rhb-full v2.2.1, table 5.3.3, p. 30).
# IARU R1 numbering. V17–V47 are simplex; RV48–RV63 are repeater
# output frequencies (use shift_hz = -600 kHz to TX). Annotations from
# the PDF "Anm" column are appended to the channel name.
# X-suffix channels (R0X, R1X…) appeared when 12.5 kHz spacing was
# introduced for repeaters.

