# Jakt och jordbruksfrekvenser 155 MHz (rhb-full v2.2.1, table 19, p. 23).
# Hunting, agriculture, forestry. 5 W. K3/K4 share with marine VHF L1/L2.
# Notes:
#   ^R restricted on Swedish territorial / inland waters (see PTSFS 2018:3)
#   ^M shared with marine VHF (leisure boats use as L1/L2)
#   ^P PMR / Friluftskanal (general PMR use)

