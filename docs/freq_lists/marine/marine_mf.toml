# Marine MF (rhb-full v2.2.1, table 7.3.1, p. 45).
# Swedish MF coast stations. Mode is SSB (J3E); recorded as FM so the
# file parses — change to SSB by hand if your radio supports it. Each
# channel split into ship + shore. MF2 omitted (no frequencies listed).

