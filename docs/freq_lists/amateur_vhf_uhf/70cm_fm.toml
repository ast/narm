# Amateur 70 cm FM channels (rhb-full v2.2.1, table 5.3.4, p. 31–32).
# IARU R1 numbering. U272–U320 simplex; RU368–RU400 are repeater
# output frequencies (use shift_hz = -2 MHz to TX). Annotations from
# the PDF "Anm" column appended to channel names. The RU* numbers also
# carry the legacy RU0–RU15(X) names.

