# PR-bandet 27 MHz / CB (rhb-full v2.2.1, table 7.1, p. 43–44).
# 4 W RMS ERP max. AM, FM and SSB allowed (USB primarily for SSB).
# K3A / K7A / K11A / K19A are radio control (RC) channels — RC use
# only, not voice. K11A is a former emergency frequency. K24 is the
# traditional SSB calling channel. Mode recorded as FM (most common
# scanner-friendly demod); real mode varies AM/FM/SSB.
# Note the non-monotonic numbering around K22–K25 (K23=27.255 follows
# K22=27.225, then K24=27.235 SSB).

