# Amateur 6 m FM channels (rhb-full v2.2.1, table 5.3.2, p. 29).
# IARU R1 channel numbering. F50–F80 are simplex; RF81–RF99 are
# repeater output frequencies (the band's standard repeater shift
# applies — typically -500 kHz, but check per-repeater data).
# Old single-letter aliases (Tidigare column) are appended in parens.

