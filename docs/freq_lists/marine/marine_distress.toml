# Marine distress and DSC frequencies (rhb-full v2.2.1, table on p. 46).
# Voice distress (USB / J3E) and DSC (digital selective calling).
# Mode recorded as FM for compatibility — the actual modes are SSB/DSC.
# Channel name suffix: " V" = voice distress, " DSC" = DSC.

