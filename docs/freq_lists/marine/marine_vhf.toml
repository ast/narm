# Marin VHF (rhb-full v2.2.1, table 23, p. 26).
# Swedish marine VHF allocation. SRC certificate required for TX.
# Each PDF row with both Skepp (ship) and Kust (shore/coast) frequencies
# is split into two channels here so a scanner picks up both sides.
# Channel 16 (156.800) is the calling/distress channel.
# Channel 70 (156.525) is DSC (digital selective calling) — TX prohibited
# for voice, but RX is useful.
# L1/L2 are leisure boat channels (shared with Jakt 155 K3/K4).
# F1–F3 are fishing channels.

